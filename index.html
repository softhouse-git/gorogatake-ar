<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>五老スカイタワー AR展望ガイド</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
// OPENING COUNTDOWN
window.addEventListener('load', function() {
  var op = document.getElementById('op');
  var circle = document.getElementById('opc');
  var numEl = document.getElementById('opn');
  var total = 163.4;
  var count = 5;
  var n = 0;

  var t = setInterval(function() {
    n++;
    var remaining = 5 - n;
    numEl.textContent = remaining;
    circle.setAttribute('stroke-dashoffset', String(total * n / 5));
    if (n >= 5) {
      clearInterval(t);
      op.style.opacity = '0';
      setTimeout(function() { op.style.display = 'none'; }, 650);
    }
  }, 1000);
});
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{width:100%;height:100%;}
body{
  width:100%;height:100%;
  overflow:hidden;
  background:#07111f;
  color:#fff;
  font-family:-apple-system,'Hiragino Sans',sans-serif;
  position:fixed;top:0;left:0;
}

/* 背景 */
#bg{
  position:absolute;inset:0;
  background:linear-gradient(175deg,#060d1a 0%,#0a1e38 20%,#123358 40%,#1b567a 55%,#2a7a6a 68%,#1e5440 80%,#0f2e20 100%);
}
#sea{position:absolute;bottom:0;left:0;right:0;height:36%;background:linear-gradient(180deg,rgba(20,60,110,.7),rgba(8,25,55,.95));}
.hline{position:absolute;bottom:36%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(91,200,255,.3),transparent);}

/* HUD */
#hud{
  position:absolute;top:0;left:0;right:0;
  padding:14px 16px 10px;
  background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);
  display:flex;justify-content:space-between;align-items:flex-start;
  z-index:30;pointer-events:none;
}
.ht{font-size:13px;font-weight:700;letter-spacing:.08em;color:rgba(255,255,255,.8);}
.hs{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px;}
.hd{font-size:28px;font-weight:300;text-align:right;line-height:1;}
.hdir{font-size:10px;color:rgba(255,255,255,.5);text-align:right;margin-top:2px;}

/* 言語 */
#lang{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  display:flex;gap:2px;
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:3px;
  z-index:31;
}
.lb{
  padding:5px 12px;border-radius:14px;border:none;
  background:transparent;color:rgba(255,255,255,.5);font-size:12px;font-weight:500;
  cursor:pointer;-webkit-appearance:none;
}
.lb.on{background:rgba(91,200,255,.2);color:#5bc8ff;border:1px solid rgba(91,200,255,.3);}

/* フィルター */
#filters{position:absolute;top:58px;right:12px;display:flex;flex-direction:column;gap:5px;z-index:30;}
.fb{
  padding:5px 10px;border-radius:12px;
  border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.5);
  color:rgba(255,255,255,.4);font-size:11px;cursor:pointer;
  white-space:nowrap;text-align:right;-webkit-appearance:none;
}
.fb.on{color:#fff;background:rgba(20,50,90,.7);}
.fb[data-l="近景"].on{border-color:#5bc8ff;color:#5bc8ff;}
.fb[data-l="中景"].on{border-color:#3de8c8;color:#3de8c8;}
.fb[data-l="遠景"].on{border-color:#a78bfa;color:#a78bfa;}
.fb[data-l="超遠景"].on{border-color:#f472b6;color:#f472b6;}

/* ARビュー */
#ar{position:absolute;inset:0;z-index:10;overflow:hidden;}

/* ピン */
.pin{position:absolute;cursor:pointer;}
.plabel{
  padding:5px 12px;border-radius:18px;font-size:12px;font-weight:600;
  white-space:nowrap;background:rgba(0,0,0,.78);
  border:1px solid rgba(255,255,255,.2);letter-spacing:.02em;
  position:absolute;transform:translateX(-50%);
}
.pdot{width:8px;height:8px;border-radius:50%;position:absolute;}
.pstem{width:1px;position:absolute;opacity:.5;}
.pin[data-l="近景"] .plabel{color:#5bc8ff;border-color:rgba(91,200,255,.4);}
.pin[data-l="中景"] .plabel{color:#3de8c8;border-color:rgba(61,232,200,.4);}
.pin[data-l="遠景"] .plabel{color:#a78bfa;border-color:rgba(167,139,250,.4);}
.pin[data-l="超遠景"] .plabel{color:#f472b6;border-color:rgba(244,114,182,.4);}
.pin[data-l="近景"] .pdot{background:#5bc8ff;box-shadow:0 0 8px #5bc8ff;}
.pin[data-l="中景"] .pdot{background:#3de8c8;box-shadow:0 0 8px #3de8c8;}
.pin[data-l="遠景"] .pdot{background:#a78bfa;box-shadow:0 0 8px #a78bfa;}
.pin[data-l="超遠景"] .pdot{background:#f472b6;box-shadow:0 0 8px #f472b6;}
.pin[data-l="近景"] .pstem{background:linear-gradient(180deg,#5bc8ff,transparent);}
.pin[data-l="中景"] .pstem{background:linear-gradient(180deg,#3de8c8,transparent);}
.pin[data-l="遠景"] .pstem{background:linear-gradient(180deg,#a78bfa,transparent);}
.pin[data-l="超遠景"] .pstem{background:linear-gradient(180deg,#f472b6,transparent);}

/* 地図 */
#mapview{position:absolute;inset:0;z-index:10;display:none;}
#mapview.show{display:block;}
#leafmap{width:100%;height:100%;}
.lf-tip{background:rgba(0,0,0,.8)!important;border:1px solid rgba(255,255,255,.2)!important;color:#fff!important;font-size:11px!important;border-radius:8px!important;padding:2px 8px!important;white-space:nowrap!important;box-shadow:none!important;}
.lf-tip::before{display:none!important;}
.lf-tower{background:rgba(0,0,0,.8)!important;border:1px solid #ffd740!important;color:#ffd740!important;font-size:11px!important;font-weight:700!important;border-radius:8px!important;padding:2px 8px!important;box-shadow:none!important;}
.lf-tower::before{display:none!important;}

/* ビュー切替 */
#vsw{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  display:flex;background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.18);border-radius:24px;overflow:hidden;z-index:30;
}
.vb{
  padding:10px 22px;border:none;background:transparent;
  color:rgba(255,255,255,.5);font-size:12px;font-weight:500;
  cursor:pointer;-webkit-appearance:none;white-space:nowrap;
}
.vb.on{background:rgba(91,200,255,.18);color:#5bc8ff;}

/* スポット数 */
#ct{
  position:absolute;bottom:68px;left:50%;transform:translateX(-50%);
  font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.06em;
  z-index:20;pointer-events:none;white-space:nowrap;
}

/* ジャイロボタン（画面下部に固定） */
#gyrobtn{
  position:absolute;bottom:80px;left:50%;transform:translateX(-50%);
  padding:12px 28px;border-radius:28px;
  border:2px solid #5bc8ff;background:rgba(0,20,50,.9);
  color:#5bc8ff;font-size:15px;font-weight:700;
  cursor:pointer;-webkit-appearance:none;
  z-index:40;white-space:nowrap;
  display:block;
}

/* 詳細パネル */
#panel{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(4,12,28,.93);border-top:1px solid rgba(255,255,255,.15);
  padding:0 20px 32px;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.16,1,.3,1);
  z-index:50;max-height:60vh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
#panel.open{transform:translateY(0);}
.ph{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:14px auto 16px;}
.ptop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.pname{font-size:20px;font-weight:700;line-height:1.3;flex:1;}
.pclose{
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.1);border:none;
  color:#fff;font-size:14px;cursor:pointer;
  flex-shrink:0;margin-left:10px;-webkit-appearance:none;
}
.ptags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.tag{font-size:11px;padding:3px 10px;border-radius:12px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.75);}
.tagh{background:rgba(91,200,255,.14);color:#5bc8ff;border:1px solid rgba(91,200,255,.3);}
.pdesc{font-size:13px;line-height:1.8;color:rgba(255,255,255,.75);margin-bottom:16px;}
#pimg{width:100%;height:180px;object-fit:cover;border-radius:12px;margin-bottom:14px;display:none;}
#pimgload{width:100%;height:60px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);font-size:12px;margin-bottom:14px;}
.pstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);}
.sv{font-size:20px;font-weight:700;color:#5bc8ff;text-align:center;line-height:1;margin-bottom:3px;}
.sl{font-size:10px;color:rgba(255,255,255,.4);text-align:center;letter-spacing:.07em;}

#op{
  position:fixed;inset:0;z-index:99999;
  background:linear-gradient(175deg,#020810 0%,#051628 15%,#082540 30%,#0e3d5c 45%,#1a5c78 55%,#1e6860 65%,#164a38 78%,#0a2820 90%,#050f15 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .6s ease;
}
.op-haze{position:absolute;border-radius:50%;filter:blur(70px);pointer-events:none;}
.op-sea{position:absolute;bottom:0;left:0;right:0;height:35%;background:linear-gradient(180deg,rgba(10,50,90,.7),rgba(5,20,45,.9));}
.op-horizon{position:absolute;bottom:35%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(91,200,255,.4),transparent);}
.op-islands{position:absolute;bottom:34%;left:0;right:0;height:60px;
  background:
    radial-gradient(ellipse 100px 35px at 12% 80%,rgba(15,40,25,.9) 0%,transparent 100%),
    radial-gradient(ellipse 180px 45px at 38% 85%,rgba(18,45,30,.9) 0%,transparent 100%),
    radial-gradient(ellipse 80px 30px at 58% 75%,rgba(14,38,22,.85) 0%,transparent 100%),
    radial-gradient(ellipse 130px 40px at 78% 82%,rgba(16,42,28,.88) 0%,transparent 100%),
    radial-gradient(ellipse 55px 22px at 92% 70%,rgba(12,32,18,.8) 0%,transparent 100%);
}
.op-glass{
  position:relative;z-index:10;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.18);
  border-radius:24px;padding:32px 36px 28px;
  text-align:center;max-width:300px;width:86%;
  box-shadow:0 8px 40px rgba(0,0,0,.45);
}
.op-badge{font-size:10px;letter-spacing:.15em;color:rgba(91,200,255,.8);border:1px solid rgba(91,200,255,.3);border-radius:20px;padding:3px 12px;margin-bottom:18px;display:inline-block;background:rgba(91,200,255,.08);}
.op-h1{font-size:26px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:6px;letter-spacing:.04em;text-shadow:0 0 30px rgba(91,200,255,.4);}
.op-sub{font-size:11px;letter-spacing:.1em;color:rgba(255,255,255,.45);margin-bottom:8px;}
.op-tag{font-size:13px;color:rgba(255,255,255,.55);line-height:1.7;margin-bottom:24px;}
.op-ring{width:60px;height:60px;margin:0 auto 8px;position:relative;}
.op-ring svg{width:60px;height:60px;transform:rotate(-90deg);}
.op-ring-n{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:700;color:#5bc8ff;}
.op-note{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.06em;}
</style>
</head>
<body>

<div id="op">
  <div class="op-haze" style="width:500px;height:200px;top:5%;left:-10%;background:rgba(91,170,220,.1);"></div>
  <div class="op-haze" style="width:350px;height:150px;top:25%;right:-5%;background:rgba(61,180,160,.09);"></div>
  <div class="op-horizon"></div>
  <div class="op-islands"></div>
  <div class="op-sea"></div>
  <div class="op-glass">
    <div class="op-badge">Gorogatake Sky Tower</div>
    <div class="op-h1">天空の<br>透明な図書館</div>
    <div class="op-sub">五老スカイタワー AR展望ガイド</div>
    <div class="op-tag">絶景の「意味」を知り、<br>記憶に刻む。</div>
    <div class="op-ring">
      <svg viewBox="0 0 60 60">
        <circle cx="30" cy="30" r="26" fill="none" stroke="rgba(91,200,255,.2)" stroke-width="3"/>

      <div class="op-ring-n" id="opn">5</div>

  </div>
</div>
<div id="bg"><div class="hline"></div><div id="sea"></div></div>

<div id="hud">
  <div><div class="ht">五老スカイタワー</div><div class="hs">AR LANDSCAPE GUIDE</div></div>
  <div><div class="hd" id="hdeg">30°</div><div class="hdir" id="hdir">北東</div></div>
</div>

<div id="lang">
  <button class="lb on" data-l="ja">日本語</button>
  <button class="lb" data-l="en">EN</button>
  <button class="lb" data-l="zh">中文</button>
</div>

<div id="filters">
  <button class="fb on" data-l="近景">近景 ～5km</button>
  <button class="fb on" data-l="中景">中景 ～15km</button>
  <button class="fb on" data-l="遠景">遠景 ～40km</button>
  <button class="fb on" data-l="超遠景">超遠景</button>
</div>

<div id="ar"></div>
<div id="mapview"><div id="leafmap"></div></div>

<div id="ct"></div>
<button id="gyrobtn">📡 向き検知をONにする</button>

<div id="vsw">
  <button class="vb on" data-v="ar">ARビュー</button>
  <button class="vb" data-v="map">地図ビュー</button>
</div>

<div id="panel">
  <div class="ph"></div>
  <img id="pimg" src="" alt="">
  <div id="pimgload"></div>
  <div class="ptop">
    <div class="pname" id="pname"></div>
    <button class="pclose" id="pclose">✕</button>
  </div>
  <div class="ptags" id="ptags"></div>
  <div class="pdesc" id="pdesc"></div>
  <div class="pstats" id="pstats"></div>
</div>

var DIRS_JA = ['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'];
var DIRS_EN = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];

// ==============================
// STATE
// ==============================
var lang = 'ja';
var bearing = 30;
var view = 'ar';
var activeL = {近景:true,中景:true,遠景:true,超遠景:true};
var FOV = 110;
var W = window.innerWidth;
var H = window.innerHeight;
var dragging = false;
var lastTX = 0;
var vel = 0;
var gyroActive = false;
var leafMap = null;
var leafMarkers = [];

function getWH() {
  W = window.innerWidth || document.documentElement.clientWidth;
  H = window.innerHeight || document.documentElement.clientHeight;
}

// ==============================
// HUD
// ==============================
function dirLabel(deg) {
  var d = ((deg % 360) + 360) % 360;
  var i = Math.round(d / 22.5) % 16;
  return lang === 'en' ? DIRS_EN[i] : DIRS_JA[i];
}
function updateHUD() {
  var d = Math.round(((bearing % 360) + 360) % 360);
  document.getElementById('hdeg').textContent = d + '°';
  document.getElementById('hdir').textContent = dirLabel(d);
}

// ==============================
// NAME
// ==============================
function getName(s) {
  return lang === 'en' ? s.en : lang === 'zh' ? s.zh : s.ja;
}
function getDesc(s) {
  return lang === 'en' ? s.desc_en : lang === 'zh' ? s.desc_zh : s.desc_ja;
}

// ==============================
// AR RENDER
// ==============================
function bToX(b) {
  var diff = b - bearing;
  while (diff > 180) diff -= 360;
  while (diff < -180) diff += 360;
  return W / 2 + (diff / FOV) * W;
}
function layerY(l) {
  return H * ({近景:.50,中景:.42,遠景:.36,超遠景:.30}[l] || .42);
}
function stemH(l) {
  return {近景:40,中景:26,遠景:15,超遠景:7}[l] || 20;
}

function renderAR() {
  getWH();
  var ar = document.getElementById('ar');
  ar.innerHTML = '';
  var count = 0;

  // Build visible list
  var vis = [];
  for (var i = 0; i < SPOTS.length; i++) {
    var s = SPOTS[i];
    if (!activeL[s.layer]) continue;
    var x = bToX(s.b);
    if (x < -100 || x > W + 100) continue;
    vis.push({s:s, ax:x, ay:layerY(s.layer), lx:x, ly:layerY(s.layer), sh:stemH(s.layer)});
  }

  // Collision avoidance (8 passes)
  for (var p = 0; p < 8; p++) {
    for (var ci = 0; ci < vis.length; ci++) {
      for (var cj = ci + 1; cj < vis.length; cj++) {
        var a = vis[ci], b = vis[cj];
        var ox = 130 - Math.abs(a.lx - b.lx);
        var oy = 32 - Math.abs(a.ly - b.ly);
        if (ox > 0 && oy > 0) {
          if (oy < ox) {
            var dy = a.ly <= b.ly ? -1 : 1;
            a.ly -= dy * (oy / 2 + 2);
            b.ly += dy * (oy / 2 + 2);
          } else {
            var dx = a.lx <= b.lx ? -1 : 1;
            a.lx -= dx * (ox / 2 + 2);
            b.lx += dx * (ox / 2 + 2);
          }
        }
      }
    }
  }

  // Render
  for (var vi = 0; vi < vis.length; vi++) {
    var item = vis[vi];
    count++;
    var pin = document.createElement('div');
    pin.className = 'pin';
    pin.setAttribute('data-l', item.s.layer);
    pin.style.left = '0';
    pin.style.top = '0';

    // Dot at anchor
    var dot = document.createElement('div');
    dot.className = 'pdot';
    dot.style.left = Math.round(item.ax) - 4 + 'px';
    dot.style.top = Math.round(item.ay) - 4 + 'px';
    pin.appendChild(dot);

    // Stem above dot
    var stem = document.createElement('div');
    stem.className = 'pstem';
    stem.style.left = Math.round(item.ax) + 'px';
    stem.style.top = Math.round(item.ay - item.sh) + 'px';
    stem.style.height = item.sh + 'px';
    pin.appendChild(stem);

    // Label at adjusted position
    var lbl = document.createElement('div');
    lbl.className = 'plabel';
    lbl.textContent = getName(item.s);
    lbl.style.left = Math.round(item.lx) + 'px';
    lbl.style.top = Math.round(item.ly - item.sh - 28) + 'px';
    pin.appendChild(lbl);

    // Connector if label moved far from anchor
    var ldx = item.lx - item.ax;
    var ldy = (item.ly - item.sh - 14) - (item.ay - item.sh);
    if (Math.abs(ldx) > 15 || Math.abs(ldy) > 15) {
      var svgNS = 'http://www.w3.org/2000/svg';
      var sv = document.createElementNS(svgNS, 'svg');
      sv.style.cssText = 'position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;overflow:visible;';
      var ln = document.createElementNS(svgNS, 'line');
      ln.setAttribute('x1', item.ax);
      ln.setAttribute('y1', item.ay - item.sh);
      ln.setAttribute('x2', item.lx);
      ln.setAttribute('y2', item.ly - item.sh - 14);
      ln.setAttribute('stroke', 'rgba(255,255,255,0.2)');
      ln.setAttribute('stroke-width', '1');
      ln.setAttribute('stroke-dasharray', '3,2');
      sv.appendChild(ln);
      pin.appendChild(sv);
    }

    (function(spot) {
      // tap detection: touchend with small movement
      var tsx = 0, tsy = 0;
      pin.addEventListener('touchstart', function(e) {
        tsx = e.touches[0].clientX;
        tsy = e.touches[0].clientY;
      }, true);
      pin.addEventListener('touchend', function(e) {
        if (Math.abs(e.changedTouches[0].clientX - tsx) < 12 &&
            Math.abs(e.changedTouches[0].clientY - tsy) < 12) {
          e.stopPropagation();
          openPanel(spot);
        }
      }, true);
      pin.addEventListener('click', function(e) {
        e.stopPropagation();
        openPanel(spot);
      });
    })(item.s);

    ar.appendChild(pin);
  }

  document.getElementById('ct').textContent = count + ' スポットを表示中';
}

// ==============================
// MAP
// ==============================
function bdToLatLon(b, d) {
  var R = 6371;
  var lat1 = BASE_LAT * Math.PI / 180;
  var lon1 = BASE_LON * Math.PI / 180;
  var br = b * Math.PI / 180;
  var dr = d / R;
  var lat2 = Math.asin(Math.sin(lat1) * Math.cos(dr) + Math.cos(lat1) * Math.sin(dr) * Math.cos(br));
  var lon2 = lon1 + Math.atan2(Math.sin(br) * Math.sin(dr) * Math.cos(lat1), Math.cos(dr) - Math.sin(lat1) * Math.sin(lat2));
  return [lat2 * 180 / Math.PI, lon2 * 180 / Math.PI];
}

var COLS = {近景:'#5bc8ff',中景:'#3de8c8',遠景:'#a78bfa',超遠景:'#f472b6'};

function renderMap() {
  if (!leafMap) {
    leafMap = L.map('leafmap', {center:[BASE_LAT, BASE_LON], zoom:10, zoomControl:true, attributionControl:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {maxZoom:18, subdomains:'abcd'}).addTo(leafMap);
    var ti = L.divIcon({html:'<div style="width:14px;height:14px;border-radius:50%;background:#ffd740;border:3px solid #fff;box-shadow:0 0 12px rgba(255,215,64,.7);"></div>',className:'',iconSize:[14,14],iconAnchor:[7,7]});
    L.marker([BASE_LAT, BASE_LON], {icon:ti}).bindTooltip('五老スカイタワー', {permanent:true, direction:'top', className:'lf-tower', offset:[0,-8]}).addTo(leafMap);
  }
  leafMarkers.forEach(function(m) { leafMap.removeLayer(m); });
  leafMarkers = [];
  var rings = [{km:5,c:'#5bc8ff'},{km:15,c:'#3de8c8'},{km:40,c:'#a78bfa'},{km:150,c:'#f472b6'}];
  rings.forEach(function(r) {
    var ci = L.circle([BASE_LAT, BASE_LON], {radius:r.km*1000, color:r.c, weight:1, opacity:.2, fillOpacity:0, dashArray:'4,4'}).addTo(leafMap);
    leafMarkers.push(ci);
  });
  SPOTS.forEach(function(s) {
    if (!activeL[s.layer]) return;
    var c = bdToLatLon(s.b, s.dist);
    var col = COLS[s.layer] || '#fff';
    var di = L.divIcon({html:'<div style="width:10px;height:10px;border-radius:50%;background:'+col+';border:2px solid rgba(255,255,255,.5);box-shadow:0 0 6px '+col+';"></div>',className:'',iconSize:[10,10],iconAnchor:[5,5]});
    var mk = L.marker(c, {icon:di}).addTo(leafMap);
    mk.bindTooltip(getName(s), {direction:'top', offset:[0,-6], className:'lf-tip'});
    (function(spot) { mk.on('click', function() { openPanel(spot); }); })(s);
    leafMarkers.push(mk);
  });
  setTimeout(function() { leafMap.invalidateSize(); }, 150);
}

// ==============================
// PANEL
// ==============================
function openPanel(s) {
  document.getElementById('pname').textContent = getName(s);
  document.getElementById('pdesc').textContent = getDesc(s) || '';
  var ll = {近景:'近景',中景:'中景',遠景:'遠景',超遠景:'超遠景'}[s.layer] || s.layer;
  document.getElementById('ptags').innerHTML =
    '<span class="tag tagh">' + ll + '</span>' +
    '<span class="tag">' + s.cat + '</span>' +
    (s.dist ? '<span class="tag">' + s.dist + 'km</span>' : '');
  if (s.dist && s.b) {
    var dl = dirLabel(s.b);
    document.getElementById('pstats').innerHTML =
      '<div><div class="sv">' + s.dist + 'km</div><div class="sl">距離</div></div>' +
      '<div><div class="sv">' + Math.round(s.b) + '°</div><div class="sl">方位角</div></div>' +
      '<div><div class="sv">' + dl + '</div><div class="sl">方角</div></div>';
  } else {
    document.getElementById('pstats').innerHTML = '';
  }
  // Reset image
  var pimg = document.getElementById('pimg');
  var pload = document.getElementById('pimgload');
  pimg.style.display = 'none';
  pload.textContent = '画像を読み込み中...';
  document.getElementById('panel').classList.add('open');
  // Fetch Wikipedia image
  fetchWikiImg(s.ja, function(url) {
    if (url) {
      pimg.onload = function() { pimg.style.display = 'block'; pload.textContent = ''; };
      pimg.onerror = function() { pload.textContent = ''; };
      pimg.src = url;
    } else {
      pload.textContent = '';
    }
  });
}

function fetchWikiImg(name, cb) {
  var q = name.replace(/（[^）]*）/g, '').replace(/\s*[\(（].*?[\)）]\s*/g, '').trim();
  var url = 'https://ja.wikipedia.org/w/api.php?action=query&titles=' + encodeURIComponent(q) + '&prop=pageimages&pithumbsize=600&format=json&origin=*';
  fetch(url).then(function(r) { return r.json(); }).then(function(d) {
    var pg = d.query && d.query.pages && Object.values(d.query.pages)[0];
    if (pg && pg.thumbnail) { cb(pg.thumbnail.source); }
    else { cb(null); }
  }).catch(function() { cb(null); });
}

// Close panel
document.getElementById('pclose').addEventListener('click', function() {
  document.getElementById('panel').classList.remove('open');
});
document.getElementById('pclose').addEventListener('touchend', function(e) {
  e.preventDefault();
  document.getElementById('panel').classList.remove('open');
});

// ==============================
// TOUCH / SWIPE on AR
// ==============================
var arEl = document.getElementById('ar');
arEl.addEventListener('touchstart', function(e) {
  if (e.target.closest('#panel')) return;
  dragging = true;
  lastTX = e.touches[0].clientX;
  vel = 0;
}, {passive:true});

arEl.addEventListener('touchmove', function(e) {
  if (!dragging) return;
  e.preventDefault();
  var dx = e.touches[0].clientX - lastTX;
  vel = dx;
  bearing -= (dx / W) * FOV;
  lastTX = e.touches[0].clientX;
  renderAR();
  updateHUD();
}, {passive:false});

arEl.addEventListener('touchend', function() {
  dragging = false;
  inertia();
}, {passive:true});

arEl.addEventListener('mousedown', function(e) { dragging = true; lastTX = e.clientX; vel = 0; });
document.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  var dx = e.clientX - lastTX;
  vel = dx; bearing -= (dx / W) * FOV;
  lastTX = e.clientX; renderAR(); updateHUD();
});
document.addEventListener('mouseup', function() { dragging = false; inertia(); });

function inertia() {
  var v = vel;
  function step() {
    if (Math.abs(v) < 0.3) return;
    bearing -= (v / W) * FOV;
    v *= 0.90;
    renderAR(); updateHUD();
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ==============================
// GYRO
// ==============================
function startGyro() {
  gyroActive = true;
  window.addEventListener('deviceorientation', function(e) {
    if (e.alpha !== null && !dragging) {
      bearing = e.alpha;
      if (view === 'ar') { renderAR(); updateHUD(); }
    }
  }, false);
}

var gyrobtn = document.getElementById('gyrobtn');
function requestGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(function(state) {
      if (state === 'granted') { startGyro(); gyrobtn.style.display = 'none'; }
      else { gyrobtn.textContent = '許可が必要です'; }
    }).catch(function() { startGyro(); gyrobtn.style.display = 'none'; });
  } else {
    startGyro(); gyrobtn.style.display = 'none';
  }
}
gyrobtn.addEventListener('click', requestGyro);
gyrobtn.addEventListener('touchend', function(e) { e.preventDefault(); requestGyro(); });

// ==============================
// VIEW SWITCH
// ==============================
var vbtns = document.querySelectorAll('.vb');
for (var vi = 0; vi < vbtns.length; vi++) {
  (function(btn) {
    function switchView() {
      view = btn.dataset.v;
      for (var i = 0; i < vbtns.length; i++) {
        vbtns[i].classList.toggle('on', vbtns[i].dataset.v === view);
      }
      arEl.style.display = view === 'ar' ? 'block' : 'none';
      var mv = document.getElementById('mapview');
      if (view === 'map') { mv.classList.add('show'); renderMap(); }
      else { mv.classList.remove('show'); }
      document.getElementById('gyrobtn').style.display = (view === 'ar' && !gyroActive) ? 'block' : 'none';
    }
    btn.addEventListener('click', switchView);
    btn.addEventListener('touchend', function(e) { e.preventDefault(); switchView(); });
  })(vbtns[vi]);
}

// ==============================
// FILTERS
// ==============================
var fbtns = document.querySelectorAll('.fb');
for (var fi = 0; fi < fbtns.length; fi++) {
  (function(btn) {
    function toggleFilter() {
      var l = btn.dataset.l;
      activeL[l] = !activeL[l];
      btn.classList.toggle('on', activeL[l]);
      if (view === 'ar') renderAR();
      else renderMap();
    }
    btn.addEventListener('click', toggleFilter);
    btn.addEventListener('touchend', function(e) { e.preventDefault(); toggleFilter(); });
  })(fbtns[fi]);
}

// ==============================
// LANGUAGE
// ==============================
var lbtns = document.querySelectorAll('.lb');
for (var li = 0; li < lbtns.length; li++) {
  (function(btn) {
    function switchLang() {
      lang = btn.dataset.l;
      for (var i = 0; i < lbtns.length; i++) {
        lbtns[i].classList.toggle('on', lbtns[i].dataset.l === lang);
      }
      if (view === 'ar') renderAR();
      else renderMap();
      updateHUD();
    }
    btn.addEventListener('click', switchLang);
    btn.addEventListener('touchend', function(e) { e.preventDefault(); switchLang(); });
  })(lbtns[li]);
}

    var remaining = 5 - n;
    numEl.textContent = remaining;
    circle.setAttribute('stroke-dashoffset', String(total * n / 5));
    if (n >= 5) {
      clearInterval(t);
      op.style.opacity = '0';
      setTimeout(function() { op.style.display = 'none'; }, 650);
    }
  }, 1000);
});
</script>
</body>
</html>
