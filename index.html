<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>五老スカイタワー AR展望ガイド</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap');

:root {
  --glass: rgba(255,255,255,0.10);
  --glass-b: rgba(255,255,255,0.22);
  --blur: blur(18px);
  --c0: #fff;
  --c1: rgba(255,255,255,0.7);
  --c2: rgba(255,255,255,0.4);
  --blue: #5bc8ff;
  --teal: #3de8c8;
  --purple: #a78bfa;
  --pink: #f472b6;
  --near: #5bc8ff;
  --mid: #3de8c8;
  --far: #a78bfa;
  --ultra: #f472b6;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Noto Sans JP','Noto Sans',sans-serif;}

/* ── SKY BG ── */
#sky{position:fixed;inset:0;background:linear-gradient(175deg,#060d1a 0%,#0a1e38 20%,#123358 40%,#1b567a 55%,#2a7a6a 68%,#1e5440 80%,#0f2e20 100%);overflow:hidden;}
.sky-star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);}
@keyframes twinkle{0%,100%{opacity:var(--op,.3)}50%{opacity:.05}}
.haze{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(91,200,255,.08),transparent 70%);}
.horizon-line{position:absolute;bottom:36%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(91,200,255,.35),transparent);}
.sea{position:absolute;bottom:0;left:0;right:0;height:36%;background:linear-gradient(180deg,rgba(20,60,110,.7),rgba(8,25,55,.95));overflow:hidden;}
.sea::after{content:'';position:absolute;top:0;left:-100%;width:300%;height:100%;background:repeating-linear-gradient(90deg,transparent 0px,rgba(91,200,255,.03) 2px,transparent 4px);animation:seaMove 10s linear infinite;}
@keyframes seaMove{to{transform:translateX(33.3%)}}

/* ── SCAN LINE ── */
#scan{position:fixed;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--teal),transparent);animation:scanDown 7s ease-in-out infinite;z-index:5;pointer-events:none;}
@keyframes scanDown{0%{top:0;opacity:0}5%{opacity:.5}95%{opacity:.2}100%{top:100vh;opacity:0}}

/* ── HUD TOP ── */
#hud{position:fixed;top:0;left:0;right:0;padding:14px 18px 10px;background:linear-gradient(180deg,rgba(0,0,0,.55),transparent);display:flex;justify-content:space-between;align-items:flex-start;z-index:40;pointer-events:none;}
.hud-left{pointer-events:auto;}
.hud-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:.12em;color:var(--c1);text-transform:uppercase;}
.hud-sub{font-size:10px;color:var(--c2);letter-spacing:.08em;margin-top:1px;}
.hud-right{text-align:right;pointer-events:auto;}
.hud-deg{font-family:'Syne',sans-serif;font-size:32px;font-weight:400;line-height:1;letter-spacing:-.03em;}
.hud-dir{font-size:10px;color:var(--c2);letter-spacing:.1em;margin-top:2px;}

/* ── LANG SWITCHER ── */
#lang-sw{position:fixed;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:41;background:rgba(0,0,0,.35);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:3px;}
.lang-btn{padding:4px 12px;border-radius:14px;border:none;background:transparent;color:var(--c2);font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;letter-spacing:.04em;}
.lang-btn.active{background:rgba(91,200,255,.2);color:var(--blue);border:1px solid rgba(91,200,255,.3);}

/* ── VIEW SWITCHER ── */
#view-sw{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);display:flex;gap:0;z-index:50;background:rgba(0,0,0,.5);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.18);border-radius:24px;overflow:hidden;}
.view-btn{padding:9px 22px;border:none;background:transparent;color:var(--c2);font-size:12px;font-family:'Noto Sans JP','Noto Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .25s;letter-spacing:.04em;display:flex;align-items:center;gap:6px;}
.view-btn.active{background:rgba(91,200,255,.18);color:var(--blue);}
.view-btn svg{width:14px;height:14px;fill:currentColor;}

/* ── LAYER FILTER ── */
#filters{position:fixed;top:72px;right:14px;display:flex;flex-direction:column;gap:5px;z-index:40;}
.f-btn{padding:5px 10px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.4);backdrop-filter:blur(8px);color:var(--c2);font-size:10px;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap;text-align:right;letter-spacing:.03em;}
.f-btn.active{color:#fff;background:rgba(20,50,90,.6);}
.f-btn[data-l="近景"].active,.f-btn[data-l="Near"].active,.f-btn[data-l="近景C"].active{border-color:var(--near);color:var(--near);}
.f-btn[data-l="中景"].active,.f-btn[data-l="Mid"].active,.f-btn[data-l="中景C"].active{border-color:var(--mid);color:var(--mid);}
.f-btn[data-l="遠景"].active,.f-btn[data-l="Far"].active,.f-btn[data-l="遠景C"].active{border-color:var(--far);color:var(--far);}
.f-btn[data-l="超遠景"].active,.f-btn[data-l="Ultra"].active,.f-btn[data-l="超遠景C"].active{border-color:var(--ultra);color:var(--ultra);}

/* ── AR VIEW ── */
#ar-view{position:fixed;inset:0;z-index:10;overflow:hidden;}
.pin{position:absolute;transform:translateX(-50%);cursor:pointer;transition:opacity .3s;animation:pinFloat var(--pd,3s) ease-in-out infinite var(--pdelay,0s);}
@keyframes pinFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
.pin-label{backdrop-filter:blur(10px);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:500;white-space:nowrap;letter-spacing:.02em;box-shadow:0 2px 14px rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.18);transition:all .25s;background:rgba(0,0,0,.72);}
.pin:hover .pin-label{transform:scale(1.06);}
.pin-stem{margin:0 auto;width:1px;opacity:.6;}
.pin-dot{width:7px;height:7px;border-radius:50%;margin:3px auto 0;box-shadow:0 0 10px currentColor;}
.pin.l-近景 .pin-label,.pin.l-Near .pin-label,.pin.l-近景C .pin-label{color:var(--near);border-color:rgba(91,200,255,.35);}
.pin.l-中景 .pin-label,.pin.l-Mid .pin-label,.pin.l-中景C .pin-label{color:var(--mid);border-color:rgba(61,232,200,.35);}
.pin.l-遠景 .pin-label,.pin.l-Far .pin-label,.pin.l-遠景C .pin-label{color:var(--purple);border-color:rgba(167,139,250,.35);}
.pin.l-超遠景 .pin-label,.pin.l-Ultra .pin-label,.pin.l-超遠景C .pin-label{color:var(--pink);border-color:rgba(244,114,182,.35);}
.pin.l-近景 .pin-dot,.pin.l-Near .pin-dot,.pin.l-近景C .pin-dot{background:var(--near);color:var(--near);}
.pin.l-中景 .pin-dot,.pin.l-Mid .pin-dot,.pin.l-中景C .pin-dot{background:var(--mid);color:var(--mid);}
.pin.l-遠景 .pin-dot,.pin.l-Far .pin-dot,.pin.l-遠景C .pin-dot{background:var(--purple);color:var(--purple);}
.pin.l-超遠景 .pin-dot,.pin.l-Ultra .pin-dot,.pin.l-超遠景C .pin-dot{background:var(--pink);color:var(--pink);}
.pin.l-近景 .pin-stem,.pin.l-Near .pin-stem,.pin.l-近景C .pin-stem{background:linear-gradient(180deg,var(--near),transparent);}
.pin.l-中景 .pin-stem,.pin.l-Mid .pin-stem,.pin.l-中景C .pin-stem{background:linear-gradient(180deg,var(--mid),transparent);}
.pin.l-遠景 .pin-stem,.pin.l-Far .pin-stem,.pin.l-遠景C .pin-stem{background:linear-gradient(180deg,var(--purple),transparent);}
.pin.l-超遠景 .pin-stem,.pin.l-Ultra .pin-stem,.pin.l-超遠景C .pin-stem{background:linear-gradient(180deg,var(--pink),transparent);}

/* ── MAP VIEW ── */
#map-view{position:fixed;inset:0;z-index:10;display:none;overflow:hidden;}
#map-view.show{display:block;}
#map-canvas{width:100%;height:100%;background:#07111f;}

/* ── DETAIL PANEL ── */
#panel{position:fixed;bottom:0;left:0;right:0;background:rgba(4,12,28,.88);backdrop-filter:blur(26px);border-top:1px solid rgba(255,255,255,.18);transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);z-index:60;max-height:60vh;overflow-y:auto;}
#panel.open{transform:translateY(0);}
.p-handle{width:36px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:14px auto 18px;}
.p-body{padding:0 20px 48px;}
.p-img{width:100%;height:160px;object-fit:cover;border-radius:12px;margin-bottom:16px;background:linear-gradient(135deg,#0a2040,#0d3060);}
.p-img-placeholder{width:100%;height:160px;border-radius:12px;margin-bottom:16px;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,rgba(91,200,255,.1),rgba(61,232,200,.08));border:1px solid rgba(255,255,255,.08);}
.p-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.p-name{font-family:'Syne',sans-serif;font-size:21px;font-weight:700;line-height:1.25;flex:1;}
.p-close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:15px;cursor:pointer;flex-shrink:0;margin-left:10px;}
.p-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.tag{font-size:11px;padding:3px 10px;border-radius:12px;background:rgba(255,255,255,.08);color:var(--c1);letter-spacing:.04em;}
.tag.hl{background:rgba(91,200,255,.14);color:var(--blue);border:1px solid rgba(91,200,255,.28);}
.p-desc{font-size:13.5px;line-height:1.85;color:var(--c1);margin-bottom:18px;}
.p-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);}
.stat{text-align:center;}
.stat-v{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--blue);line-height:1;margin-bottom:3px;}
.stat-l{font-size:10px;color:var(--c2);letter-spacing:.07em;}

/* ── SPOT COUNT ── */
#spot-ct{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--c2);letter-spacing:.07em;z-index:35;pointer-events:none;white-space:nowrap;}

/* ── SWIPE HINT ── */
.hint{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--c2);display:flex;align-items:center;gap:6px;animation:fadeHint 5s ease-in-out 2s both;letter-spacing:.06em;pointer-events:none;z-index:35;}
@keyframes fadeHint{0%,100%{opacity:0}20%,80%{opacity:1}}
.ha{animation:bx 1s ease-in-out infinite;}
@keyframes bx{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}

/* ── MAP OVERLAY SPOTS ── */
.map-spot{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:15;}
.map-dot{width:10px;height:10px;border-radius:50%;border:2px solid rgba(255,255,255,.6);transition:transform .2s;}
.map-spot:hover .map-dot{transform:scale(1.6);}
.map-spot-label{position:absolute;left:50%;transform:translateX(-50%);top:-22px;font-size:10px;white-space:nowrap;background:rgba(0,0,0,.65);padding:2px 7px;border-radius:10px;pointer-events:none;opacity:0;transition:opacity .2s;}
.map-spot:hover .map-spot-label{opacity:1;}
.map-spot.ml-近景 .map-dot,.map-spot.ml-Near .map-dot{background:var(--near);}
.map-spot.ml-中景 .map-dot,.map-spot.ml-Mid .map-dot{background:var(--mid);}
.map-spot.ml-遠景 .map-dot,.map-spot.ml-Far .map-dot{background:var(--far);}
.map-spot.ml-超遠景 .map-dot,.map-spot.ml-Ultra .map-dot{background:var(--ultra);}

/* tower marker */
.tower-marker{position:absolute;transform:translate(-50%,-50%);z-index:20;pointer-events:none;}
.tower-dot{width:16px;height:16px;border-radius:50%;background:rgba(255,220,80,.9);border:3px solid #fff;box-shadow:0 0 20px rgba(255,220,80,.6);}
.tower-label{position:absolute;left:50%;transform:translateX(-50%);top:-26px;font-size:11px;font-weight:700;white-space:nowrap;color:#ffd740;background:rgba(0,0,0,.7);padding:2px 8px;border-radius:10px;}

/* map grid lines */
.map-grid{position:absolute;inset:0;pointer-events:none;background:
  repeating-linear-gradient(0deg,rgba(91,200,255,.04) 0px,transparent 1px,transparent 60px,rgba(91,200,255,.04) 61px),
  repeating-linear-gradient(90deg,rgba(91,200,255,.04) 0px,transparent 1px,transparent 60px,rgba(91,200,255,.04) 61px);}

/* range circles */
.range-circle{position:absolute;border-radius:50%;border:1px solid rgba(91,200,255,.12);transform:translate(-50%,-50%);pointer-events:none;}
.range-label{position:absolute;font-size:9px;color:rgba(91,200,255,.4);letter-spacing:.06em;}

/* map compass */
.map-compass{position:fixed;top:80px;left:16px;width:44px;height:44px;z-index:41;display:none;}
.map-compass.show{display:block;}
.mc-outer{width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);position:relative;}
.mc-n{position:absolute;top:50%;left:50%;width:2px;height:14px;transform-origin:bottom center;transform:translateX(-50%) rotate(0deg);background:linear-gradient(180deg,var(--blue),transparent);}
.mc-label{position:absolute;top:3px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--blue);}
</style>
</head>
<body>

<!-- Sky -->
<div id="sky">
  <div class="haze" style="width:400px;height:200px;top:15%;left:30%"></div>
  <div class="haze" style="width:300px;height:150px;top:25%;right:20%"></div>
  <div class="horizon-line"></div>
  <div class="sea"></div>
</div>
<div id="scan"></div>

<!-- Stars -->
<script>
(function(){
  const sky=document.getElementById('sky');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.className='sky-star';
    const sz=Math.random()*2+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*55}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${-Math.random()*5}s;--op:${.1+Math.random()*.5}`;
    sky.appendChild(s);
  }
})();
</script>

<!-- HUD -->
<div id="hud">
  <div class="hud-left">
    <div class="hud-title" id="hud-title">五老スカイタワー</div>
    <div class="hud-sub" id="hud-sub">AR LANDSCAPE GUIDE</div>
  </div>
  <div class="hud-right">
    <div class="hud-deg" id="hud-deg">30°</div>
    <div class="hud-dir" id="hud-dir">北東</div>
  </div>
</div>

<!-- Language switcher -->
<div id="lang-sw">
  <button class="lang-btn active" data-lang="ja">日本語</button>
  <button class="lang-btn" data-lang="en">EN</button>
  <button class="lang-btn" data-lang="zh">中文</button>
</div>

<!-- Layer filter -->
<div id="filters"></div>

<!-- Map compass -->
<div class="map-compass" id="map-compass">
  <div class="mc-outer">
    <div class="mc-label">N</div>
    <div class="mc-n"></div>
  </div>
</div>

<!-- AR View -->
<div id="ar-view"></div>

<!-- Map View -->
<div id="map-view">
  <canvas id="map-canvas"></canvas>
</div>

<!-- Spot count -->
<div id="spot-ct"></div>

<!-- Swipe hint -->
<div class="hint" id="swipe-hint">
  <span class="ha" style="transform:rotate(180deg)">→</span>
  <span id="hint-text">スワイプして探索</span>
  <span class="ha">→</span>
</div>

<!-- View switcher -->
<div id="view-sw">
  <button class="view-btn active" id="btn-ar" data-view="ar">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    <span id="vbtn-ar">ARビュー</span>
  </button>
  <button class="view-btn" id="btn-map" data-view="map">
    <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
    <span id="vbtn-map">地図ビュー</span>
  </button>
</div>

<!-- Detail Panel -->
<div id="panel">
  <div class="p-handle"></div>
  <div class="p-body">
    <div id="p-img-wrap"></div>
    <div class="p-top">
      <div class="p-name" id="p-name"></div>
      <button class="p-close" id="p-close">✕</button>
    </div>
    <div class="p-tags" id="p-tags"></div>
    <div class="p-desc" id="p-desc"></div>
    <div class="p-stats" id="p-stats"></div>
  </div>
</div>

<script>

  { id:3, layer:'近景', cat:'旧軍港', dist:3.95, bearing:73.7, lat:35.474756, lon:135.385441, emoji:'🧱',

let lang = 'ja';
let currentBearing = 30;
let activeView = 'ar';
let activeLayers = new Set(['近景','中景','遠景','超遠景','Near','Mid','Far','Ultra','近景C','中景C','遠景C','超遠景C']);
let isDragging = false, lastX = 0, velocity = 0;
const FOV = 115;
const VW = ()=>document.documentElement.clientWidth||window.innerWidth;
const VH = ()=>document.documentElement.clientHeight||window.innerHeight;

// ── Layer key helpers ──
function layerKey(l, lng) {
  const map = { ja:{近景:'近景',中景:'中景',遠景:'遠景',超遠景:'超遠景'}, en:{近景:'Near',中景:'Mid',遠景:'Far',超遠景:'Ultra'}, zh:{近景:'近景C',中景:'中景C',遠景:'遠景C',超遠景:'超遠景C'} };
  return (map[lng]||map.ja)[l]||l;
}
function isLayerActive(spot) {
  return ['ja','en','zh'].some(lng => activeLayers.has(layerKey(spot.layer, lng)));
}

// ── Update language ──
function setLang(l) {
  lang = l;
  const t = I18N[l];
  document.getElementById('hud-title').textContent = t.title;
  document.getElementById('hud-sub').textContent = t.sub;
  document.getElementById('vbtn-ar').textContent = t.ar;
  document.getElementById('vbtn-map').textContent = t.map;
  document.getElementById('hint-text').textContent = t.hint;
  buildFilters();
  renderAR();
  if(activeView==='map') renderMap();
  updateHUD();
}

// ── Filters ──
function buildFilters() {
  const t = I18N[lang];
  const el = document.getElementById('filters');
  el.innerHTML = '';
  t.layerKeys.forEach((k,i) => {
    const origKey = ['近景','中景','遠景','超遠景'][i];
    const btn = document.createElement('button');
    btn.className = 'f-btn active';
    btn.dataset.l = k;
    btn.dataset.orig = origKey;
    btn.textContent = t.layers[i];
    btn.addEventListener('click', () => {
      // toggle all lang variants
      const keys = ['ja','en','zh'].map(lg => layerKey(origKey,lg));
      const isActive = activeLayers.has(k);
      keys.forEach(key => isActive ? activeLayers.delete(key) : activeLayers.add(key));
      btn.classList.toggle('active', !isActive);
      renderAR();
      if(activeView==='map') renderMap();
    });
    el.appendChild(btn);
  });
}

// ── HUD ──
function updateHUD() {
  const deg = Math.round(((currentBearing%360)+360)%360);
  document.getElementById('hud-deg').textContent = deg+'°';
  const dirs = I18N[lang].dirs;
  const idx = Math.round(deg/22.5)%16;
  document.getElementById('hud-dir').textContent = dirs[idx];
}

// ══════════════════════════════════════════
// AR VIEW
// ══════════════════════════════════════════
function bearingToX(b) {
  let diff = b - currentBearing;
  while(diff>180) diff-=360;
  while(diff<-180) diff+=360;
  return VW()/2 + (diff/FOV)*VW();
}

function layerToY(layer) {
  const h = VH();
  const m = {近景:.50,中景:.42,遠景:.37,超遠景:.32};
  return h*(m[layer]||.42);
}

function stemHeight(layer) {
  return {近景:42,中景:28,遠景:16,超遠景:8}[layer]||22;
}

function renderAR() {
  const scene = document.getElementById('ar-view');
  scene.innerHTML = '';
  let count = 0;

  SPOTS.forEach((s,i) => {
    if(!isLayerActive(s)) return;
    const x = bearingToX(s.bearing);
    if(x < -150 || x > VW()+150) return;
    count++;

    const lk = layerKey(s.layer, lang);
    const y = layerToY(s.layer);
    const stemH = stemHeight(s.layer);
    const scale = Math.max(0.55, 1-(s.dist/320));
    const pdelay = (i*0.4)%3;
    const pd = 2.5 + (i*0.3)%1.5;

    const pin = document.createElement('div');
    pin.className = `pin l-${lk}`;
    pin.style.cssText = `left:${x}px;top:${y}px;--pd:${pd}s;--pdelay:-${pdelay}s;`;
    pin.innerHTML = `
      <div class="pin-label" style="transform:scale(${scale})">${s[lang].name}</div>
      <div class="pin-stem" style="height:${stemH}px"></div>
      <div class="pin-dot"></div>`;
    pin.addEventListener('click',()=>openPanel(s));
    scene.appendChild(pin);
  });

  document.getElementById('spot-ct').textContent = I18N[lang].spotCount(count);
}

// ══════════════════════════════════════════
// MAP VIEW
// ══════════════════════════════════════════
let mapEl = null;

function renderMap() {
  const mv = document.getElementById('map-view');
  mv.innerHTML = '';

  // Calculate bounds
  const lats = SPOTS.filter(s=>s.lat).map(s=>s.lat).concat([BASE.lat]);
  const lons = SPOTS.filter(s=>s.lon).map(s=>s.lon).concat([BASE.lon]);
  const minLat = Math.min(...lats)-0.05;
  const maxLat = Math.max(...lats)+0.05;
  const minLon = Math.min(...lons)-0.05;
  const maxLon = Math.max(...lons)+0.05;

  const w = VW(), h = VH();
  const pad = 60;

  function toXY(lat,lon) {
    const x = pad + (lon-minLon)/(maxLon-minLon)*(w-pad*2);
    const y = h-pad - (lat-minLat)/(maxLat-minLat)*(h-pad*2);
    return [x,y];
  }

  // SVG map
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',w);
  svg.setAttribute('height',h);
  svg.style.cssText='position:absolute;inset:0;';

  // Grid
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  const grid = document.createElementNS('http://www.w3.org/2000/svg','pattern');
  grid.setAttribute('id','grid');grid.setAttribute('width','50');grid.setAttribute('height','50');
  grid.setAttribute('patternUnits','userSpaceOnUse');
  const gl1 = document.createElementNS('http://www.w3.org/2000/svg','path');
  gl1.setAttribute('d','M 50 0 L 0 0 0 50');gl1.setAttribute('fill','none');
  gl1.setAttribute('stroke','rgba(91,200,255,0.06)');gl1.setAttribute('stroke-width','1');
  grid.appendChild(gl1);defs.appendChild(grid);svg.appendChild(defs);

  const gridrect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  gridrect.setAttribute('width',w);gridrect.setAttribute('height',h);
  gridrect.setAttribute('fill','url(#grid)');svg.appendChild(gridrect);

  // Range circles from tower
  const [tx,ty] = toXY(BASE.lat,BASE.lon);
  [5,15,40,150].forEach((km,i) => {
    const colors = ['rgba(91,200,255','rgba(61,232,200','rgba(167,139,250','rgba(244,114,182'];
    const latDeg = km/111;
    const [ex] = toXY(BASE.lat,BASE.lon + latDeg/Math.cos(BASE.lat*Math.PI/180));
    const r = Math.abs(ex-tx);
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',tx);circle.setAttribute('cy',ty);circle.setAttribute('r',r);
    circle.setAttribute('fill','none');
    circle.setAttribute('stroke',`${colors[i]},0.12)`);
    circle.setAttribute('stroke-width','1');
    circle.setAttribute('stroke-dasharray','4,4');
    svg.appendChild(circle);

    // label
    const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',tx+r-2);lbl.setAttribute('y',ty-4);
    lbl.setAttribute('fill',`${colors[i]},0.4)`);
    lbl.setAttribute('font-size','9');lbl.setAttribute('text-anchor','end');
    lbl.textContent = km+'km';svg.appendChild(lbl);
  });

  // Lines from tower to spots
  SPOTS.filter(s=>s.lat&&isLayerActive(s)).forEach(s=>{
    const [sx,sy]=toXY(s.lat,s.lon);
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',tx);line.setAttribute('y1',ty);
    line.setAttribute('x2',sx);line.setAttribute('y2',sy);
    const cols={近景:'rgba(91,200,255',中景:'rgba(61,232,200',遠景:'rgba(167,139,250',超遠景:'rgba(244,114,182'};
    line.setAttribute('stroke',`${cols[s.layer]||cols['近景']},0.15)`);
    line.setAttribute('stroke-width','1');
    svg.appendChild(line);
  });

  mv.appendChild(svg);

  // Tower marker
  const tm = document.createElement('div');
  tm.className = 'tower-marker';
  tm.style.cssText = `left:${tx}px;top:${ty}px;`;
  tm.innerHTML = `<div class="tower-label">${I18N[lang].towerLabel}</div><div class="tower-dot"></div>`;
  mv.appendChild(tm);

  // Spot dots
  const layerCols = {近景:'var(--near)',中景:'var(--mid)',遠景:'var(--far)',超遠景:'var(--ultra)'};
  SPOTS.filter(s=>s.lat&&isLayerActive(s)).forEach(s=>{
    const [sx,sy]=toXY(s.lat,s.lon);
    const lk=layerKey(s.layer,lang);
    const dot=document.createElement('div');
    dot.className=`map-spot ml-${lk}`;
    dot.style.cssText=`left:${sx}px;top:${sy}px;`;
    dot.innerHTML=`
      <div class="map-spot-label">${s[lang].name}</div>
      <div class="map-dot" style="background:${layerCols[s.layer]};border-color:rgba(255,255,255,.5)"></div>`;
    dot.addEventListener('click',()=>openPanel(s));
    mv.appendChild(dot);
  });
}

// ══════════════════════════════════════════
// PANEL
// ══════════════════════════════════════════
function openPanel(s) {
  const t = I18N[lang];
  document.getElementById('p-name').textContent = s[lang].name;
  document.getElementById('p-desc').textContent = s[lang].desc;

  // Image placeholder with emoji
  document.getElementById('p-img-wrap').innerHTML =
    `<div class="p-img-placeholder" style="font-size:52px">${s.emoji}</div>`;

  // Tags
  const lk=layerKey(s.layer,lang);
  const layerLabel=t.layers[['近景','中景','遠景','超遠景'].indexOf(s.layer)]||s.layer;
  document.getElementById('p-tags').innerHTML=
    `<span class="tag hl">${layerLabel}</span><span class="tag">${s.cat}</span>${s.dist?`<span class="tag">${s.dist}km</span>`:''}`;

  // Stats
  if(s.dist&&s.bearing){
    const dirs=t.dirs;
    const di=Math.round(s.bearing/22.5)%16;
    document.getElementById('p-stats').innerHTML=`
      <div class="stat"><div class="stat-v">${s.dist}km</div><div class="stat-l">${t.dist}</div></div>
      <div class="stat"><div class="stat-v">${Math.round(s.bearing)}°</div><div class="stat-l">${t.bearing}</div></div>
      <div class="stat"><div class="stat-v">${dirs[di]}</div><div class="stat-l">${t.dir}</div></div>`;
  } else {
    document.getElementById('p-stats').innerHTML='';
  }

  document.getElementById('panel').classList.add('open');
}

document.getElementById('p-close').addEventListener('click',()=>{
  document.getElementById('panel').classList.remove('open');
});

// ══════════════════════════════════════════
// VIEW SWITCH
// ══════════════════════════════════════════
document.querySelectorAll('.view-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    activeView=btn.dataset.view;
    document.querySelectorAll('.view-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===activeView));
    document.getElementById('ar-view').style.display=activeView==='ar'?'block':'none';
    document.getElementById('map-view').classList.toggle('show',activeView==='map');
    document.getElementById('map-compass').classList.toggle('show',activeView==='map');
    document.getElementById('scan').style.display=activeView==='ar'?'block':'none';
    document.getElementById('swipe-hint').style.display=activeView==='ar'?'flex':'none';
    document.getElementById('hud-deg').parentElement.style.display=activeView==='ar'?'block':'none';
    if(activeView==='map') renderMap();
  });
});

// ══════════════════════════════════════════
// LANGUAGE
// ══════════════════════════════════════════
document.querySelectorAll('.lang-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===btn.dataset.lang));
    setLang(btn.dataset.lang);
    // update font
    const fonts={ja:"'Noto Sans JP',sans-serif",en:"'Noto Sans','Syne',sans-serif",zh:"'Noto Sans SC',sans-serif"};
    document.body.style.fontFamily=fonts[btn.dataset.lang];
  });
});

// ══════════════════════════════════════════
// DRAG
// ══════════════════════════════════════════
function onDragStart(x){isDragging=true;lastX=x;velocity=0;}
function onDragMove(x){
  if(!isDragging) return;
  const dx=x-lastX;
  velocity=dx;
  currentBearing-=dx/VW()*FOV;
  lastX=x;
  if(activeView==='ar'){renderAR();updateHUD();}
}
function onDragEnd(){isDragging=false;inertia();}

function inertia(){
  let v=velocity;
  function step(){
    if(Math.abs(v)<0.15) return;
    currentBearing-=v/VW()*FOV;
    v*=0.91;
    if(activeView==='ar'){renderAR();updateHUD();}
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

document.addEventListener('mousedown',e=>{
  if(e.target.closest('#panel')||e.target.closest('#filters')||e.target.closest('#view-sw')||e.target.closest('#lang-sw')) return;
  onDragStart(e.clientX);
});
document.addEventListener('mousemove',e=>{if(isDragging)onDragMove(e.clientX);});
document.addEventListener('mouseup',onDragEnd);
document.addEventListener('touchstart',e=>{
  if(e.target.closest('#panel')||e.target.closest('#filters')||e.target.closest('#view-sw')||e.target.closest('#lang-sw')) return;
  onDragStart(e.touches[0].clientX);
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(e.target.closest('#panel')) return;
  onDragMove(e.touches[0].clientX);
},{passive:true});
document.addEventListener('touchend',onDragEnd);

// Gyroscope
function startGyro() {
  window.addEventListener('deviceorientation', e => {
    if(e.alpha !== null && !isDragging) {
      currentBearing = e.alpha;
      if(activeView==='ar') { renderAR(); updateHUD(); }
    }
  });
}

// Gyro button — created in init() to ensure DOM is ready

// Auto-demo pan
let autoPan=true; setTimeout(()=>autoPan=false,10000);
(function demo(){
  if(!autoPan||isDragging) return;
  currentBearing+=0.04;
  if(activeView==='ar'){renderAR();updateHUD();}
  requestAnimationFrame(demo);
})();

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
function setupGyroButton() {
  const gyroBtn = document.createElement('button');
  gyroBtn.id = 'gyro-btn';
  gyroBtn.textContent = '📡 向き検知をONにする';
  gyroBtn.setAttribute('style', [
    'position:fixed',
    'bottom:90px',
    'left:50%',
    'transform:translateX(-50%)',
    'z-index:9999',
    'padding:12px 24px',
    'border-radius:28px',
    'border:2px solid #5bc8ff',
    'background:#001428',
    'color:#5bc8ff',
    'font-size:15px',
    'font-weight:700',
    'cursor:pointer',
    'white-space:nowrap',
    'display:block'
  ].join(';'));
  document.body.appendChild(gyroBtn);

  gyroBtn.addEventListener('click', function() {
    if(typeof DeviceOrientationEvent !== 'undefined' &&
       typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(function(state) {
        if(state === 'granted') {
          startGyro();
          gyroBtn.parentNode && gyroBtn.parentNode.removeChild(gyroBtn);
        } else {
          gyroBtn.textContent = '許可してください';
        }
      }).catch(function() {
        startGyro();
        gyroBtn.parentNode && gyroBtn.parentNode.removeChild(gyroBtn);
      });
    } else {
      startGyro();
      gyroBtn.parentNode && gyroBtn.parentNode.removeChild(gyroBtn);
    }
  });
}

function init() {
  buildFilters();
  renderAR();
  updateHUD();
  setupGyroButton();
}

window.addEventListener('resize', () => {
  if(activeView==='ar') renderAR();
  else renderMap();
});

if(document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
// Also re-render after fonts/resources load
window.addEventListener('load', () => {
  if(activeView==='ar') renderAR();
});
</script>
